openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: generate
    description: AI document generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateDocument
      tags: [generate]
      summary: Generate a legal document
      description: Streams an AI-generated legal document via SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentRequest"
      responses:
        "200":
          description: SSE stream of generated text
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DocumentRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [tnc, privacy, license, summary]
        businessName:
          type: ["string", "null"]
        jurisdiction:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        specialNeeds:
          type: ["string", "null"]
        licenseType:
          type: ["string", "null"]
        year:
          type: ["string", "null"]
        fullname:
          type: ["string", "null"]
        customRequirements:
          type: ["string", "null"]
        licenseText:
          type: ["string", "null"]
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
